name: Build and Release

on:
  push:
    branches:
      - main
      - master
      - feat/*
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -f VERSION ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
          else
            echo "version=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Build Frontend
        shell: bash
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN=true VITE_REACT_APP_VERSION=${{ steps.version.outputs.version }} bun run build

      - name: Build Backend
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          # Set binary name
          if [ "${{ matrix.os }}" = "windows" ]; then
            BINARY_NAME="new-api-${{ matrix.os }}-${{ matrix.arch }}.exe"
          else
            BINARY_NAME="new-api-${{ matrix.os }}-${{ matrix.arch }}"
          fi
          
          # Build with optimizations
          go build -ldflags="-s -w" -o "$BINARY_NAME"
          
          # Create checksum
          if [ "${{ matrix.os }}" = "windows" ]; then
            certutil -hashfile "$BINARY_NAME" SHA256 > "${BINARY_NAME}.sha256"
          else
            sha256sum "$BINARY_NAME" > "${BINARY_NAME}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            new-api-${{ matrix.os }}-${{ matrix.arch }}*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
